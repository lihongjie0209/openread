name: CI

on:
  push:
    branches: ["main", "master"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
  pull_request:
    branches: ["main", "master"]
    paths-ignore:
      - "**.md"
      - "LICENSE"

jobs:
  build:
    name: Build & Vet
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o openread${{ matrix.os == 'windows-latest' && '.exe' || '' }} .
